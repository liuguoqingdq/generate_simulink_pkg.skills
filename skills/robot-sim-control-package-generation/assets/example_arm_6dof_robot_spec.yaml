project:
  name: arm_6dof_robot
  robot_type: arm_6dof
  goal: [simscape_control_validation, ros2_control_deployment]
  target_platforms:
    ros2: {distro: humble, ubuntu: "22.04"}
    simulation: [simulink, simscape]
    control_runtime: [simulink, cpp_ros2_control]
frames:
  convention: ros
  base_link: base_link
  end_effector_frame: tool0
  axes: {x: forward, y: left, z: up}
links:
  - {name: base_link, role: base, moving: false, source: estimated, geometry: {visual: {type: cylinder, radius: 0.10, length: 0.08}, collision: {type: cylinder, radius: 0.10, length: 0.08}}, inertial: {mass: 3.0, com_xyz: [0,0,0], inertia: auto_cylinder}}
  - {name: shoulder_link, role: shoulder, moving: true, source: estimated, geometry: {visual: {type: box, size: [0.08,0.08,0.12]}, collision: {type: box, size: [0.08,0.08,0.12]}}, inertial: {mass: 1.5, com_xyz: [0,0,0.04], inertia: auto_box}}
  - {name: upper_arm_link, role: upper_arm, moving: true, source: estimated, geometry: {visual: {type: box, size: [0.08,0.06,0.32]}, collision: {type: box, size: [0.08,0.06,0.32]}}, inertial: {mass: 1.2, com_xyz: [0,0,0.16], inertia: auto_box}}
  - {name: forearm_link, role: forearm, moving: true, source: estimated, geometry: {visual: {type: box, size: [0.06,0.05,0.26]}, collision: {type: box, size: [0.06,0.05,0.26]}}, inertial: {mass: 0.9, com_xyz: [0,0,0.13], inertia: auto_box}}
  - {name: wrist1_link, role: wrist, moving: true, source: estimated, geometry: {visual: {type: cylinder, radius: 0.04, length: 0.08}, collision: {type: cylinder, radius: 0.04, length: 0.08}}, inertial: {mass: 0.35, com_xyz: [0,0,0], inertia: auto_cylinder}}
  - {name: wrist2_link, role: wrist, moving: true, source: estimated, geometry: {visual: {type: cylinder, radius: 0.035, length: 0.07}, collision: {type: cylinder, radius: 0.035, length: 0.07}}, inertial: {mass: 0.25, com_xyz: [0,0,0], inertia: auto_cylinder}}
  - {name: wrist3_link, role: wrist, moving: true, source: estimated, geometry: {visual: {type: cylinder, radius: 0.03, length: 0.06}, collision: {type: cylinder, radius: 0.03, length: 0.06}}, inertial: {mass: 0.2, com_xyz: [0,0,0], inertia: auto_cylinder}}
  - {name: tool0, role: end_effector_frame, moving: true, source: estimated, geometry: {visual: {type: box, size: [0.04,0.04,0.04]}, collision: {type: box, size: [0.04,0.04,0.04]}}, inertial: {mass: 0.1, com_xyz: [0,0,0], inertia: auto_box}}
joints:
  - {name: shoulder_pan_joint, type: revolute, source: estimated, parent: base_link, child: shoulder_link, origin_xyz: [0,0,0.08], origin_rpy: [0,0,0], axis: [0,0,1], limit: {lower: -3.14, upper: 3.14, effort: 80, velocity: 2.5}, dynamics: {damping: 0.6, friction: 0.04}}
  - {name: shoulder_lift_joint, type: revolute, source: estimated, parent: shoulder_link, child: upper_arm_link, origin_xyz: [0,0,0.10], origin_rpy: [0,0,0], axis: [0,1,0], limit: {lower: -1.8, upper: 1.8, effort: 80, velocity: 2.5}, dynamics: {damping: 0.6, friction: 0.04}}
  - {name: elbow_joint, type: revolute, source: estimated, parent: upper_arm_link, child: forearm_link, origin_xyz: [0,0,0.32], origin_rpy: [0,0,0], axis: [0,1,0], limit: {lower: -2.4, upper: 2.4, effort: 60, velocity: 3.0}, dynamics: {damping: 0.5, friction: 0.03}}
  - {name: wrist1_joint, type: revolute, source: estimated, parent: forearm_link, child: wrist1_link, origin_xyz: [0,0,0.26], origin_rpy: [0,0,0], axis: [1,0,0], limit: {lower: -3.14, upper: 3.14, effort: 25, velocity: 4.0}, dynamics: {damping: 0.2, friction: 0.02}}
  - {name: wrist2_joint, type: revolute, source: estimated, parent: wrist1_link, child: wrist2_link, origin_xyz: [0,0,0.08], origin_rpy: [0,0,0], axis: [0,1,0], limit: {lower: -2.0, upper: 2.0, effort: 20, velocity: 4.0}, dynamics: {damping: 0.2, friction: 0.02}}
  - {name: wrist3_joint, type: revolute, source: estimated, parent: wrist2_link, child: wrist3_link, origin_xyz: [0,0,0.07], origin_rpy: [0,0,0], axis: [1,0,0], limit: {lower: -3.14, upper: 3.14, effort: 15, velocity: 5.0}, dynamics: {damping: 0.15, friction: 0.01}}
  - {name: tool0_fixed_joint, type: fixed, source: estimated, parent: wrist3_link, child: tool0, origin_xyz: [0,0,0.06], origin_rpy: [0,0,0]}
actuators:
  - {name: shoulder_pan_motor, joint: shoulder_pan_joint, source: estimated, command_interface: effort, state_interfaces: [position, velocity, effort], effort_limit: 80, velocity_limit: 2.5}
  - {name: shoulder_lift_motor, joint: shoulder_lift_joint, source: estimated, command_interface: effort, state_interfaces: [position, velocity, effort], effort_limit: 80, velocity_limit: 2.5}
  - {name: elbow_motor, joint: elbow_joint, source: estimated, command_interface: effort, state_interfaces: [position, velocity, effort], effort_limit: 60, velocity_limit: 3.0}
  - {name: wrist1_motor, joint: wrist1_joint, source: estimated, command_interface: effort, state_interfaces: [position, velocity, effort], effort_limit: 25, velocity_limit: 4.0}
  - {name: wrist2_motor, joint: wrist2_joint, source: estimated, command_interface: effort, state_interfaces: [position, velocity, effort], effort_limit: 20, velocity_limit: 4.0}
  - {name: wrist3_motor, joint: wrist3_joint, source: estimated, command_interface: effort, state_interfaces: [position, velocity, effort], effort_limit: 15, velocity_limit: 5.0}
control:
  controller_type: joint_space_pd
  command_input: joint_trajectory
  output: effort
  sample_time_s: 0.002
simulation:
  plant_input: effort
  plant_output: [q, dq, pose]
  dynamic_simulation_required: true
  collision_required: true
  inertial_required: true
  simscape: {torque_driven: true, enable_position_sensing: true, enable_velocity_sensing: true}
ros2_control:
  hardware_plugin: gazebo_ros2_control/GazeboSystem
  joints:
    - {name: shoulder_pan_joint, command_interfaces: [effort], state_interfaces: [position, velocity, effort]}
    - {name: shoulder_lift_joint, command_interfaces: [effort], state_interfaces: [position, velocity, effort]}
    - {name: elbow_joint, command_interfaces: [effort], state_interfaces: [position, velocity, effort]}
    - {name: wrist1_joint, command_interfaces: [effort], state_interfaces: [position, velocity, effort]}
    - {name: wrist2_joint, command_interfaces: [effort], state_interfaces: [position, velocity, effort]}
    - {name: wrist3_joint, command_interfaces: [effort], state_interfaces: [position, velocity, effort]}
  controllers: {joint_state_broadcaster: true, joint_trajectory_controller: true}
outputs:
  required_files: [params/robot_spec.yaml, urdf/robot.urdf.xacro, config/ros2_control.xacro, config/controllers.yaml, launch/sim.launch.py, scripts/validate_robot_package.py, README.md]
validation:
  generate_validate_script: true
  check_urdf: true
  check_joint_name_consistency: true
  check_inertial_collision: true
  check_limits_dynamics: true
  check_interface_contract: true
forbidden: [toy_demo, readme_only, hardcoded_scattered_params, missing_inertial, missing_collision, fake_position_animation]
